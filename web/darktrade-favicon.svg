<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4A853"/>
      <stop offset="100%" stop-color="#C4963E"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="2" y="2" width="60" height="60" rx="14" ry="14" fill="url(#bg)"/>
  <!-- Stock candlestick / upward arrow -->
  <!-- Candle body -->
  <rect x="28" y="18" width="8" height="18" rx="2" fill="white" opacity="0.95"/>
  <!-- Upper wick -->
  <line x1="32" y1="10" x2="32" y2="18" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.95"/>
  <!-- Lower wick -->
  <line x1="32" y1="36" x2="32" y2="52" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.95"/>
  <!-- Small upward arrow accent -->
  <polygon points="32,4 26,14 30,14 30,10 34,10 34,14 38,14" fill="white" opacity="0.9"/>
</svg>
